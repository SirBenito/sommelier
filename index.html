<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lars de Sommelier</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        :root {
            /* Sfeervolle bordeauxrode retro palet */
            --bg-dark: #1a0a0c;
            --panel-bg: rgba(242, 237, 228, 0.96);
            --panel-border: #8c2531;
            --text-main: #2b2521;
            --success: #2e7d32;
            --warning: #e65100;
            --danger: #c62828;
            --btn-hover: #e0d8c8;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'VT323', monospace;
            /* Diepe sfeervolle wijnrode radial gradient */
            background: radial-gradient(circle, #300f13 0%, #100305 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtiel CRT Scanline effect voor echte arcade sfeer */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* --- LAYOUT & CONTAINERS --- */
        #app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background: rgba(26, 10, 12, 0.85); /* Donkere sfeervolle overlay over de background */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 20px;
            align-items: center;
            justify-content: flex-start;
            overflow-y: auto;
            animation: fadeIn 0.3s ease-in-out;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            font-family: 'Press Start 2P', cursive; 
            font-size: 22px; 
            color: var(--panel-border); 
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            margin-bottom: 10px; 
            line-height: 1.4;
            text-align: center;
        }

        .btn {
            font-family: 'Press Start 2P', cursive;
            background: var(--panel-border); 
            color: white;
            border: 4px solid #58111A; 
            padding: 15px 20px; 
            font-size: 14px;
            border-radius: 8px; 
            cursor: pointer;
            box-shadow: 0 6px 0px #3a080f;
            transition: all 0.1s;
            width: 100%;
            text-align: center;
            margin-top: 15px;
        }
        .btn:active:not(:disabled) { 
            transform: translateY(6px); 
            box-shadow: 0 0px 0px #3a080f; 
        }

        /* --- START PANEL --- */
        .menu-panel {
            background: var(--panel-bg);
            border: 4px solid var(--panel-border);
            border-radius: 12px;
            padding: 30px 20px;
            width: 100%;
            text-align: center;
            margin: auto;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            margin: 15px auto;
            border: 4px solid var(--panel-border);
            border-radius: 12px;
            background-color: #e0d8c8;
            /* Aangepast naar jouw images folder op GitHub! */
            background-image: url('images/Lars_idle.png'); 
            background-size: cover;
            background-position: center;
            image-rendering: pixelated;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transition: transform 0.2s ease-in-out;
        }

        .rules-box {
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            font-size: 18px;
            line-height: 1.5;
            margin-top: 15px;
        }

        /* --- GAMEPLAY UI --- */
        .header-bar {
            width: 100%; 
            display: flex; 
            justify-content: space-between;
            padding: 12px 20px; 
            background: var(--panel-bg);
            border-bottom: 4px solid var(--panel-border);
            font-size: 26px; 
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 5;
        }

        .stage-container {
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            width: 100%;
            padding: 15px;
            min-height: 220px;
        }

        /* Lars display frame */
        .lars-frame {
            width: 100%;
            max-width: 280px;
            height: 100%;
            max-height: 280px;
            background-color: #2b1114;
            border: 4px solid var(--panel-border);
            border-radius: 12px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            image-rendering: pixelated; /* Mooie scherpe retro pixels */
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            transition: transform 0.2s, background-image 0.2s ease-in-out;
        }
        
        /* Subtiele retro adem-animatie */
        @keyframes subtleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .lars-frame.idle {
            /* Gelinkt naar de images folder op GitHub! */
            background-image: url('images/Lars_idle.png');
            animation: subtleBounce 2s infinite ease-in-out;
        }
        .lars-frame.fail {
            /* Gelinkt naar de images folder op GitHub! */
            background-image: url('images/Lars_fail.png');
            animation: none;
            transform: scale(0.98);
        }

        .customer-card {
            background: var(--panel-bg); 
            padding: 15px; 
            border-radius: 12px;
            border: 4px solid var(--panel-border); 
            font-size: 22px; 
            text-align: center;
            margin-bottom: 15px; 
            width: 100%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            position: relative;
        }
        .customer-card::before {
            content: "Klant zegt:";
            position: absolute;
            top: -12px;
            left: 15px;
            background: var(--panel-border);
            color: white;
            font-size: 14px;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Press Start 2P', cursive;
        }

        .options-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            width: 100%; 
            padding-bottom: 20px; 
        }

        .wine-btn {
            font-family: 'VT323', monospace; 
            background: var(--panel-bg);
            border: 3px solid #888; 
            padding: 12px 15px; 
            font-size: 20px;
            border-radius: 8px; 
            cursor: pointer; 
            text-align: left;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 0px #888;
        }
        .wine-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #888;
        }
        .wine-btn:hover { border-color: var(--panel-border); background: var(--btn-hover); }

        /* --- FEEDBACK MODAL --- */
        #feedback-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: flex-end;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
            z-index: 20;
        }
        #feedback-overlay.show { opacity: 1; pointer-events: auto; }

        .feedback-panel {
            background: var(--panel-bg); 
            border-top: 6px solid var(--panel-border);
            width: 100%; padding: 25px 20px;
            border-radius: 16px 16px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            text-align: center;
        }
        #feedback-overlay.show .feedback-panel { transform: translateY(0); }

        .status-badge {
            font-family: 'Press Start 2P', cursive; 
            font-size: 14px; 
            margin-bottom: 12px; 
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            color: white;
        }
        #feedback-desc { font-size: 22px; margin-bottom: 20px; }

        /* --- PROGRESS BAR & RANKS (Game Over) --- */
        .progress-bar-container {
            width: 100%;
            height: 26px;
            background: #e0d8c8;
            border: 4px solid var(--panel-border);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            margin: 15px 0;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--success);
            transition: width 1.2s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        .progress-bar-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 2px; left: 0;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: #111;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
        }
        .rank-badge {
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            display: inline-block;
            margin: 15px 0;
            box-shadow: 0 4px 0px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }
    </style>
    <!-- Tone.js for high-fidelity browser-synthesized audio effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>

<div id="app-container">
    
    <!-- MENU SCHERM -->
    <div id="start-screen" class="screen menu-screen active">
        <div class="menu-panel">
            <h1>SOMMELIER<br>LARS</h1>
            <div id="start-profile" class="profile-pic"></div>
            <p style="font-size: 22px; font-weight: bold;">De Enige Echte Expert</p>
            
            <div class="rules-box">
                🍷 <b>Perfecte Match:</b> +100 pt<br>
                😐 <b>Prima Match:</b> +50 pt<br>
                🤢 <b>Foute Match:</b> -1 leven
            </div>
            
            <button class="btn" id="start-btn" onclick="startGame()">START SHIFT</button>
        </div>
    </div>

    <!-- SPEL SCHERM -->
    <div id="game-screen" class="screen">
        <div class="header-bar">
            <div>⭐ <span id="score">0</span></div>
            <div id="lives">❤️❤️❤️</div>
        </div>

        <div class="stage-container">
            <div id="lars-sprite" class="lars-frame idle"></div>
        </div>

        <div class="customer-card">
            "<span id="customer-quote"></span>"
        </div>

        <div class="options-grid" id="options"></div>
    </div>

    <!-- FEEDBACK OVERLAY -->
    <div id="feedback-overlay">
        <div class="feedback-panel">
            <div id="status-badge" class="status-badge">RESULTAAT</div>
            <div id="feedback-desc">Uitleg over de wijn.</div>
            <button class="btn" id="feedback-next-btn" onclick="nextRound()">VOLGENDE KLANT</button>
        </div>
    </div>

    <!-- GAME OVER SCHERM -->
    <div id="game-over-screen" class="screen">
        <div class="menu-panel" style="margin: auto;">
            <h1>EINDE SHIFT</h1>
            <p id="game-over-msg" style="font-size: 22px; margin-bottom: 10px; font-weight: bold;"></p>
            
            <p style="font-size: 20px;">Jouw Score:</p>
            <!-- Progress Bar of your score vs max score -->
            <div class="progress-bar-container">
                <div id="score-progress" class="progress-bar-fill"></div>
                <div id="score-progress-text" class="progress-bar-text">0 / 0 PT</div>
            </div>

            <div id="rank-badge" class="rank-badge">NIVEAU</div>
            <p id="rank-desc" style="font-size: 20px; line-height: 1.4; margin-bottom: 20px;"></p>

            <button class="btn" onclick="resetApp()">OPNIEUW SPELEN</button>
        </div>
    </div>

</div>

<script>
    // --- AUDIO ENGINE (Synthesized Retro FX) ---
    const Audio = {
        synth: null,
        init: function() {
            if (!this.synth) this.synth = new Tone.PolySynth(Tone.Synth).toDestination();
        },
        playClick: function() {
            if (!this.synth) return;
            this.synth.triggerAttackRelease("C6", "32n", undefined, 0.15);
        },
        playSelect: function() {
            if (!this.synth) return;
            this.synth.triggerAttackRelease("G5", "16n", undefined, 0.3);
        },
        playSuccess: function() {
            if (!this.synth) return;
            const now = Tone.now();
            this.synth.triggerAttackRelease(["C5", "E5", "G5"], "8n", now, 0.4);
            this.synth.triggerAttackRelease(["E5", "G5", "C6"], "4n", now + 0.12, 0.4);
        },
        playOk: function() {
            if (!this.synth) return;
            const now = Tone.now();
            this.synth.triggerAttackRelease("C5", "8n", now, 0.3);
            this.synth.triggerAttackRelease("E5", "4n", now + 0.12, 0.3);
        },
        playFail: function() {
            if (!this.synth) return;
            const now = Tone.now();
            this.synth.triggerAttackRelease("D3", "4n", now, 0.5);
            this.synth.triggerAttackRelease("A2", "2n", now + 0.25, 0.5);
        }
    };

    // --- DATASET (De 12 hoogwaardig onderzochte Franse wijnmatches) ---
    const wineDB = [
        { customer: "Ik bestel een zware, gegrilde ribeye steak met pepersaus.", options: [
            { wine: "Bordeaux (Cabernet Sauvignon)", type: "perfect", desc: "Perfect! De stevige tannines breken prachtig door het vette vlees." },
            { wine: "Bourgogne (Pinot Noir)", type: "ok", desc: "Prima, rood bij rood vlees, maar eigenlijk wat te licht voor zware pepersaus." },
            { wine: "Zoete Sauternes", type: "bad", desc: "Vreselijk! Zoete dessertwijn bij een vette pepersteak is een ware misdaad." }]
        },
        { customer: "We delen een dozijn verse, zoute oesters.", options: [
            { wine: "Chablis (Strakke Chardonnay)", type: "perfect", desc: "Geniaal. De kalkachtige mineraliteit past perfect bij ziltige oesters." },
            { wine: "Champagne Brut", type: "ok", desc: "Lekker feestelijk, de bubbels snijden er ook prima doorheen." },
            { wine: "Zware Shiraz (Rood)", type: "bad", desc: "Nee! Rode wijn bij oesters geeft een ranzige metaalachtige smaak." }]
        },
        { customer: "Ik eet een super pittige Thaise groene curry.", options: [
            { wine: "Gewürztraminer (Licht zoet)", type: "perfect", desc: "Spot on! Een beetje restzoet in de Elzas-wijn blust de pittigheid af." },
            { wine: "Droge Sauvignon Blanc", type: "ok", desc: "Lekker fris, maar blust de intense hitte van de curry niet optimaal." },
            { wine: "Houtgelagerde Chardonnay", type: "bad", desc: "Oef! Alcohol en eikenhout maken het eten alleen maar brandender." }]
        },
        { customer: "Voor mij de rijke, romige truffelrisotto.", options: [
            { wine: "Barolo (Nebbiolo)", type: "perfect", desc: "Klassiek! De aardse, herfstige tonen matchen fantastisch met truffel." },
            { wine: "Meursault (Vol wit)", type: "ok", desc: "Lekker romig wit past goed bij de vettige textuur van de risotto." },
            { wine: "Lichte Provence Rosé", type: "bad", desc: "Te waterig voor zo'n zwaar, intens warm winters gerecht." }]
        },
        { customer: "Een plankje met sterke, blauwe schimmelkaas (Roquefort).", options: [
            { wine: "Sauternes", type: "perfect", desc: "De koninklijke match! Het zoete balanceert het extreme zout van de kaas." },
            { wine: "Ruby Port", type: "ok", desc: "Sterk en zoet, past eigenlijk altijd wel bij blauwe kazen." },
            { wine: "Droge Champagne", type: "bad", desc: "De hoge zuren vloeken totaal met de bittere schimmelkaas." }]
        },
        { customer: "Gebraden eendenborst met een zachte bessensaus.", options: [
            { wine: "Bourgogne (Pinot Noir)", type: "perfect", desc: "Prachtig! Aardse en fruitige tonen van Pinot Noir zijn gemaakt voor eend." },
            { wine: "Beaujolais", type: "ok", desc: "Lekker sappig en fruitig, past redelijk goed bij de bessensaus." },
            { wine: "Zware Cabernet Sauvignon", type: "bad", desc: "Te lomp. De stroeve tannines vernietigen de verfijnde smaak van de eend." }]
        },
        { customer: "Klassieke pasta Carbonara met veel spek en kaas.", options: [
            { wine: "Frascati of Soave", type: "perfect", desc: "Heerlijk fris Italiaans wit snijdt perfect door het vette spek heen." },
            { wine: "Lichte Pinot Noir", type: "ok", desc: "Rood kan, mits licht gekoeld en met weinig tannine geserveerd." },
            { wine: "Zware, eikenhouten Malbec", type: "bad", desc: "Veel te zwaar en stroef, overheerst de romige pasta volledig." }]
        },
        { customer: "Een frisse salade met geitenkaas en honing.", options: [
            { wine: "Sancerre (Sauvignon Blanc)", type: "perfect", desc: "What grows together goes together. Sancerre snijdt soepel door de vette geitenkaas." },
            { wine: "Droge Rosé", type: "ok", desc: "Een veilige, frisse en zomers lichte keuze voor bij een salade." },
            { wine: "Zware, warme Shiraz", type: "bad", desc: "Rode, zware alcoholische wijn bij deze salade is echt niet oké." }]
        },
        { customer: "Gegrilde zalmmoot met dille-kruidenboter.", options: [
            { wine: "Pouilly-Fuissé (Chardonnay)", type: "perfect", desc: "Uitstekend! De vettige zalm en romige boter vragen om rijpe Bourgogne Chardonnay." },
            { wine: "Chablis", type: "ok", desc: "Lekker fris, maar mist een beetje de body om de zalmboter te dragen." },
            { wine: "Stroeve Nebbiolo", type: "bad", desc: "Vreselijk! De combinatie van visvet en harde tannines smaakt metaalachtig." }]
        },
        { customer: "Huisgemaakte lasagne met kruidig gehakt en bechamelsaus.", options: [
            { wine: "Chianti Classico (Sangiovese)", type: "perfect", desc: "Bellissimo! De zuren in de Sangiovese matchen de tomaat perfect." },
            { wine: "Primitivo", type: "ok", desc: "Lekker fruitig en sappig, een makkelijke partner voor pasta." },
            { wine: "Kurkdroge, strakke Riesling", type: "bad", desc: "Slaat de plank volledig mis. De scherpe zuren verpesten de bechamelsaus." }]
        },
        { customer: "Verse sushi met rauwe tonijn en sojasaus.", options: [
            { wine: "Droge Elzas Riesling", type: "perfect", desc: "Uitstekend! Zeer zuiver, strak en droog genoeg voor de rauwe vis." },
            { wine: "Mousserende Cava", type: "ok", desc: "De bubbels verfrissen je mond na elk hapje sushi." },
            { wine: "Châteauneuf-du-Pape", type: "bad", desc: "Echt een ramp. De zware alcohol brandt de delicate sushi helemaal weg." }]
        },
        { customer: "Zacht gegaarde varkenshaas met champignonsaus.", options: [
            { wine: "Côtes du Rhône (Grenache blend)", type: "perfect", desc: "Heerlijk soepel en kruidig rood dat perfect bij champignons aansluit." },
            { wine: "Houtgelagerde Chardonnay", type: "ok", desc: "Romig wit past prima bij de romige champignonsaus." },
            { wine: "Superzoete port", type: "bad", desc: "Veel te zoet en dominant bij varkenshaas met hartige saus." }]
        }
    ];

    // --- GAME STATE ---
    let state = {
        score: 0,
        lives: 3,
        questions: [],
        currentIndex: 0,
        locked: false
    };

    function shuffle(arr) {
        return arr.sort(() => Math.random() - 0.5);
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function startGame() {
        // Init browser audio after user gesture
        await Tone.start();
        Audio.init();
        Audio.playClick();

        state.score = 0;
        state.lives = 3;
        state.questions = shuffle([...wineDB]);
        state.currentIndex = 0;
        
        updateHeader();
        switchScreen('game-screen');
        loadQuestion();
    }

    function updateHeader() {
        document.getElementById('score').innerText = state.score;
        let hearts = '';
        for(let i=0; i<3; i++) hearts += (i < state.lives) ? '❤️' : '🖤';
        document.getElementById('lives').innerText = hearts;
    }

    function loadQuestion() {
        state.locked = false;
        document.getElementById('feedback-overlay').classList.remove('show');
        
        const larsSprite = document.getElementById('lars-sprite');
        larsSprite.className = 'lars-frame idle';

        const q = state.questions[state.currentIndex];
        document.getElementById('customer-quote').innerText = q.customer;

        const optionsBox = document.getElementById('options');
        optionsBox.innerHTML = '';
        
        // Shuffle current options
        const choices = shuffle([...q.options]);
        choices.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'wine-btn';
            btn.innerHTML = `🍷 &nbsp; ${opt.wine}`;
            btn.onclick = () => handleChoice(opt);
            optionsBox.appendChild(btn);
        });
    }

    // --- STREAMING_CHUNK: Processing user choices and adjusting UI states... ---
    function handleChoice(option) {
        if (state.locked) return;
        state.locked = true;
        Audio.playSelect();

        const badge = document.getElementById('status-badge');
        document.getElementById('feedback-desc').innerText = option.desc;
        const sprite = document.getElementById('lars-sprite');

        setTimeout(() => {
            if (option.type === 'perfect') {
                state.score += 100;
                badge.innerText = "⭐ PERFECT! (+100)";
                badge.style.backgroundColor = "var(--success)";
                sprite.className = 'lars-frame idle';
                Audio.playSuccess();
            } else if (option.type === 'ok') {
                state.score += 50;
                badge.innerText = "✔️ PRIMA KEUZE (+50)";
                badge.style.backgroundColor = "var(--warning)";
                sprite.className = 'lars-frame idle';
                Audio.playOk();
            } else {
                state.score -= 50;
                state.lives -= 1;
                badge.innerText = "❌ VRESELIJK! (-1 leven)";
                badge.style.backgroundColor = "var(--danger)";
                sprite.className = 'lars-frame fail';
                Audio.playFail();
            }

            updateHeader();

            // Als je levens op zijn, of als dit de allerlaatste klant was:
            const nextBtn = document.getElementById('feedback-next-btn');
            if (state.lives <= 0 || state.currentIndex >= state.questions.length - 1) {
                nextBtn.innerText = "BEKIJK RESULTAAT";
            } else {
                nextBtn.innerText = "VOLGENDE KLANT";
            }

            document.getElementById('feedback-overlay').classList.add('show');
        }, 150);
    }

    function nextRound() {
        Audio.playClick();
        
        // Check OF we moeten stoppen
        if (state.lives <= 0) {
            return showGameOver("Je bent ontslagen! Te veel klanten ontevreden.");
        }
        
        state.currentIndex++;
        
        if (state.currentIndex >= state.questions.length) {
            return showGameOver("Gefeliciteerd! Je hebt de shift overleefd.");
        }

        loadQuestion();
    }

    // --- STREAMING_CHUNK: Calculating ranks and building final progress bar... ---
    function showGameOver(msg) {
        document.getElementById('feedback-overlay').classList.remove('show');
        document.getElementById('game-over-msg').innerText = msg;

        const maxScore = state.questions.length * 100;
        const finalScore = state.score;

        // Update progress bar
        const pct = Math.max(0, Math.min(100, (finalScore / maxScore) * 100));
        document.getElementById('score-progress').style.width = pct + '%';
        document.getElementById('score-progress-text').innerText = `${finalScore} / ${maxScore} PT`;

        // Ranks bepalen en sfeervol tonen
        const badge = document.getElementById('rank-badge');
        const desc = document.getElementById('rank-desc');

        if (state.lives <= 0) {
            badge.innerText = "🤢 PRUTSER";
            badge.style.backgroundColor = "var(--danger)";
            desc.innerText = "Lars schudt droevig zijn hoofd. Je hebt alle levens verloren en liet klanten met een vieze smaak achter. Weet je wel het verschil tussen azijn en een dure Bourgogne?";
        } else if (pct < 45) {
            badge.innerText = "🤢 PRUTSER";
            badge.style.backgroundColor = "var(--danger)";
            desc.innerText = "Oei... Je hebt de shift overleefd, maar je kent er eigenlijk nog niks van. Gelukkig kan Lars je nog een hoop leren!";
        } else if (pct < 80) {
            badge.innerText = "😐 WIJNLIEFHEBBER";
            badge.style.backgroundColor = "var(--warning)";
            desc.innerText = "Niet slecht! Je hebt al enig idee wat wijn is en weet de basisregels aardig te hanteren. Lars knikt goedkeurend.";
        } else {
            badge.innerText = "⭐ RECHTE EXPERT";
            badge.style.backgroundColor = "var(--success)";
            desc.innerText = "Subliem! Je bent een absolute sommelier-legende, een waardige opvolger van Lars zelf. Jij proeft de tannines al op kilometers afstand!";
        }

        switchScreen('game-over-screen');
    }

    function resetApp() {
        Audio.playClick();
        switchScreen('start-screen');
    }
</script>
