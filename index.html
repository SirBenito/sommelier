<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Sommelier: Neo-Bistro 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Press+Start+2P&display=swap');

        :root {
            --bg-base: #0f070a;
            --bg-glass: rgba(30, 15, 20, 0.65);
            --wine-red: #e6194b;
            --wine-dark: #58111A;
            --gold: #ffd700;
            --success: #00e676;
            --warning: #ffea00;
            --danger: #ff1744;
            --text-light: #f8f0f2;
            --font-pixel: 'Press Start 2P', cursive;
            --font-modern: 'Outfit', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-modern);
            background-color: var(--bg-base);
            color: var(--text-light);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #301018 0%, #0a0204 100%);
        }

        /* 32-bit CRT Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 999;
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.6;
        }

        /* Particle Canvas */
        #particle-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 900;
        }

        #game-container {
            width: 100%;
            max-width: 550px;
            height: 100dvh;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(230, 25, 75, 0.15);
            perspective: 1000px;
        }

        /* Screen Shake Animation */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-active { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        /* --- SCREENS --- */
        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 25px;
            align-items: center;
            z-index: 10;
        }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* --- START & GAME OVER (NEO-BISTRO STYLE) --- */
        .menu-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid rgba(230, 25, 75, 0.5);
            border-bottom: 2px solid rgba(230, 25, 75, 0.5);
            border-radius: 16px;
            padding: 40px 25px;
            text-align: center;
            margin: auto;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(230, 25, 75, 0.1);
        }

        h1 {
            font-family: var(--font-pixel);
            font-size: 26px;
            color: var(--text-light);
            text-shadow: 3px 3px 0px var(--wine-red), -1px -1px 0px var(--gold);
            margin-bottom: 10px;
            line-height: 1.4;
            letter-spacing: 1px;
        }

        .subtitle { font-size: 18px; color: #a09095; font-weight: 300; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }

        /* --- BUTTONS --- */
        .btn-neo {
            font-family: var(--font-pixel);
            background: linear-gradient(135deg, var(--wine-red) 0%, var(--wine-dark) 100%);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            padding: 20px;
            font-size: 14px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 8px 0px rgba(40, 5, 10, 0.8), 0 15px 20px rgba(230, 25, 75, 0.4);
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        .btn-neo::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg) translateY(-100%);
            transition: transform 0.5s ease-out;
        }
        .btn-neo:hover::after { transform: rotate(45deg) translateY(100%); }
        .btn-neo:active { transform: translateY(8px); box-shadow: 0 0px 0px rgba(40, 5, 10, 0.8), 0 5px 10px rgba(230, 25, 75, 0.4); border-color: var(--gold); }

        /* --- STREAMING_CHUNK: Game UI Elements & Timer --- */
        .top-hud {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-glass); backdrop-filter: blur(10px);
            padding: 15px 20px; border-radius: 0 0 20px 20px;
            border-bottom: 2px solid rgba(255,255,255,0.05);
            margin-bottom: 15px; flex-shrink: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .score-block { display: flex; flex-direction: column; }
        .score-label { font-size: 12px; color: #a09095; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .score-val { font-family: var(--font-pixel); font-size: 20px; color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        
        .combo-badge {
            background: linear-gradient(90deg, #ff9100, #ffea00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: var(--font-pixel); font-size: 14px;
            animation: pulseGlow 1s infinite alternate;
            opacity: 0; transition: opacity 0.3s;
        }
        .combo-badge.active { opacity: 1; }
        @keyframes pulseGlow { from { filter: drop-shadow(0 0 2px #ff9100); transform: scale(1); } to { filter: drop-shadow(0 0 8px #ffea00); transform: scale(1.1); } }

        .lives-block { font-size: 20px; letter-spacing: 4px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        
        .controls { display: flex; gap: 15px; }
        .icon-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; transition: transform 0.2s; opacity: 0.7; }
        .icon-btn:hover { opacity: 1; transform: scale(1.1); }

        /* Timer Bar */
        .timer-container { width: 100%; height: 6px; background: rgba(0,0,0,0.5); border-radius: 3px; overflow: hidden; margin-bottom: 20px; flex-shrink: 0; }
        .timer-fill { height: 100%; width: 100%; background: var(--success); transition: width 0.1s linear, background-color 0.3s; }
        .timer-fill.warning { background: var(--warning); }
        .timer-fill.danger { background: var(--danger); }

        /* --- STREAMING_CHUNK: Character Stage & 3D Cards --- */
        .stage-area {
            flex: 1; display: flex; justify-content: center; align-items: flex-end;
            width: 100%; min-height: 220px; position: relative;
        }

        .lars-sprite {
            width: 100%; max-width: 280px; aspect-ratio: 1/1;
            background-color: transparent;
            background-size: contain; background-repeat: no-repeat; background-position: bottom center;
            image-rendering: pixelated;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s;
            z-index: 5;
        }

        @keyframes breathe { 0%, 100% { transform: translateY(0) scaleY(1); } 50% { transform: translateY(-3px) scaleY(1.02); } }
        .lars-sprite.idle { background-image: url('images/Lars_idle.png'); animation: breathe 2.5s infinite ease-in-out; }
        
        /* Fallbacks if local images are missing (Generates a CSS silhouette) */
        .lars-sprite.idle:after { content: ''; position: absolute; inset:0; background: linear-gradient(to bottom, transparent 20%, rgba(230,25,75,0.2) 100%); z-index: -1; opacity: 0; transition: opacity 0.5s; }
        
        .lars-sprite.action { background-image: url('images/Lars_fail.png'); animation: none; transform: scale(1.15) translateY(-5%); z-index: 20; }
        .lars-sprite.success-glow { filter: drop-shadow(0 0 30px var(--success)); }
        .lars-sprite.fail-glow { filter: drop-shadow(0 0 40px var(--danger)); }

        /* 3D Customer Card */
        .card-container { perspective: 1000px; width: 100%; margin-bottom: 15px; z-index: 10; flex-shrink: 0; }
        .customer-card {
            background: linear-gradient(145deg, rgba(40,20,30,0.9) 0%, rgba(20,10,15,0.95) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-left: 4px solid var(--wine-red);
            border-radius: 12px; padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }
        .card-title { font-family: var(--font-pixel); font-size: 10px; color: var(--wine-red); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        .card-quote { font-size: 20px; font-weight: 700; line-height: 1.4; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        .options-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; z-index: 10; padding-bottom: 20px;}
        .opt-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-light);
            padding: 16px 20px; font-size: 17px; font-weight: 600; font-family: var(--font-modern);
            border-radius: 10px; cursor: pointer; text-align: left;
            display: flex; align-items: center;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }
        .opt-btn:hover { background: rgba(230, 25, 75, 0.2); border-color: var(--wine-red); transform: translateX(5px); }
        .opt-btn:active { transform: scale(0.98); }
        .wine-icon { font-size: 22px; margin-right: 12px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); }

        /* --- STREAMING_CHUNK: Feedback Modal & Game Over --- */
        #feedback-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100;
            padding: 20px;
        }
        #feedback-overlay.show { opacity: 1; pointer-events: auto; }
        
        .feedback-box {
            background: var(--bg-base); border: 2px solid var(--wine-red);
            border-radius: 16px; padding: 30px 25px; width: 100%; max-width: 400px;
            text-align: center; transform: scale(0.8) translateY(50px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(230, 25, 75, 0.1);
        }
        #feedback-overlay.show .feedback-box { transform: scale(1) translateY(0); }
        
        .fb-badge { font-family: var(--font-pixel); font-size: 14px; margin-bottom: 15px; display: inline-block; padding: 8px 16px; border-radius: 6px; color: #000; text-transform: uppercase; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .fb-desc { font-size: 18px; line-height: 1.5; margin-bottom: 25px; color: #e0d8c8; font-weight: 300;}

        /* Game Over Specifics */
        .go-bg {
            position: absolute; inset: 0; z-index: -1;
            background-image: url('images/Lars_fail.png'); /* Dynamic in JS */
            background-size: cover; background-position: center;
            filter: brightness(0.2) blur(4px); opacity: 0.8;
            transition: background-image 0.5s;
        }
        .rank-badge { font-family: var(--font-pixel); font-size: 16px; padding: 12px 20px; border-radius: 8px; color: #000; margin: 15px 0; display: inline-block; box-shadow: 0 6px 0 rgba(0,0,0,0.4); text-shadow: none; }
        .go-stats { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 12px; border-left: 4px solid var(--wine-red); text-align: left; margin-bottom: 25px; width: 100%; }
        .go-stats p { font-size: 18px; margin-bottom: 8px; display: flex; justify-content: space-between; font-weight: 300;}
        .go-stats b { font-family: var(--font-pixel); font-size: 14px; color: var(--gold); }
    </style>
    <!-- Tone.js for Next-Gen Retro Audio -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div id="game-container">
    
    <!-- MAIN MENU -->
    <div id="start-screen" class="screen active">
        <div class="menu-panel" style="margin-top: 10vh;">
            <h1>SOMMELIER<br>2026</h1>
            <div class="subtitle">Neo-Bistro Edition</div>
            
            <div style="width: 120px; height: 120px; margin: 0 auto 20px auto; border-radius: 16px; border: 4px solid var(--wine-red); background: url('images/Lars_idle.png') bottom center/cover no-repeat; background-color: var(--bg-base); image-rendering: pixelated; box-shadow: 0 10px 20px rgba(0,0,0,0.5);"></div>
            
            <div style="font-size: 15px; font-weight: 300; text-align: left; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; margin-bottom: 25px; line-height: 1.6;">
                <span style="color:var(--success);">● PERFECT:</span> +100pt & Combo<br>
                <span style="color:var(--warning);">● PRIMA:</span> +50pt<br>
                <span style="color:var(--danger);">● FOUT / TE LAAT:</span> -1 Leven
            </div>
            
            <button class="btn-neo" onclick="initGame()">Start Shift</button>
        </div>
    </div>

    <div id="game-ui" class="screen" style="padding: 0;">
        <div class="top-hud">
            <div class="score-block">
                <span class="score-label">Score</span>
                <span class="score-val" id="score-display">0</span>
            </div>
            <div class="combo-badge" id="combo-display">x1 COMBO</div>
            <div class="controls">
                <div class="lives-block" id="lives-display">❤️❤️❤️</div>
                <button class="icon-btn" onclick="toggleMute()" id="mute-btn">🔊</button>
                <button class="icon-btn" onclick="quitGame()">🚪</button>
            </div>
        </div>

        <div class="timer-container"><div class="timer-fill" id="timer-bar"></div></div>

        <div class="stage-area">
            <div id="lars-sprite" class="lars-sprite idle"></div>
        </div>

        <!-- Scrollable wrapper for cards so it fits all screens -->
        <div style="width: 100%; padding: 0 20px; display: flex; flex-direction: column; flex: 1; justify-content: flex-end;">
            <div class="card-container" id="card-container">
                <div class="customer-card">
                    <div class="card-title">Bestelling:</div>
                    <div class="card-quote">"<span id="customer-text"></span>"</div>
                </div>
            </div>

            <div class="options-grid" id="options-container"></div>
        </div>
    </div>

    <!-- FEEDBACK OVERLAY -->
    <div id="feedback-overlay">
        <div class="feedback-box">
            <div id="fb-badge" class="fb-badge">STATUS</div>
            <div id="fb-desc" class="fb-desc">Uitleg.</div>
            <button class="btn-neo" id="fb-btn" onclick="nextQuestion()">Verder</button>
        </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="game-over-screen" class="screen">
        <div class="go-bg" id="go-bg"></div>
        <div class="menu-panel" style="margin-top: auto; margin-bottom: 20px; background: rgba(15, 7, 10, 0.85);">
            <h1 style="font-size: 32px; margin-bottom: 5px;">SHIFT END</h1>
            <div id="go-rank" class="rank-badge">RANK</div>
            
            <div class="go-stats">
                <p>Eindscore: <b id="go-score">0</b></p>
                <p>Max Combo: <b id="go-combo">x1</b></p>
                <p style="font-size: 14px; margin-top: 15px; color: #aaa; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; display: block;" id="go-roast">...</p>
            </div>
            
            <button class="btn-neo" onclick="resetToMenu()">Opnieuw Spelen</button>
        </div>
    </div>

</div>

<script>
    // --- 32-Bit Particle Engine (Canvas) ---
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.color = color;
            this.size = Math.random() * 6 + 4;
            this.speedX = (Math.random() - 0.5) * 15;
            this.speedY = (Math.random() - 1) * 15;
            this.gravity = 0.5;
            this.life = 1;
            this.decay = Math.random() * 0.02 + 0.015;
        }
        update() {
            this.x += this.speedX;
            this.speedY += this.gravity;
            this.y += this.speedY;
            this.life -= this.decay;
        }
        draw() {
            ctx.fillStyle = `rgba(${this.color}, ${this.life})`;
            ctx.fillRect(this.x, this.y, this.size, this.size); // Square pixels for retro feel
        }
    }

    function spawnParticles(colorRGB, amount = 40) {
        const x = window.innerWidth / 2; const y = window.innerHeight * 0.4; // Center stage
        for(let i=0; i<amount; i++) particles.push(new Particle(x, y, colorRGB));
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for(let i = particles.length - 1; i >= 0; i--) {
            particles[i].update(); particles[i].draw();
            if(particles[i].life <= 0) particles.splice(i, 1);
        }
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // --- Modern Audio Engine (Tone.js) ---
    let isMuted = false;
    const AudioSys = {
        bgm: null, loop: null, sfxSuccess: null, sfxFail: null, sfxTick: null, sfxPop: null,
        init() {
            if(this.bgm) return;
            // Droning cyberpunk/french bass
            this.bgm = new Tone.Synth({ oscillator: { type: "fmsquare", modulationType: "sawtooth" }, envelope: { attack: 0.1, decay: 0.3, sustain: 0.2, release: 1 } }).toDestination();
            this.bgm.volume.value = -18;
            
            this.sfxSuccess = new Tone.PolySynth(Tone.Synth, { oscillator: { type: "sine" }, envelope: { attack: 0.01, decay: 0.3, sustain: 0, release: 0.1 } }).toDestination();
            this.sfxSuccess.volume.value = -8;
            
            this.sfxFail = new Tone.MembraneSynth({ pitchDecay: 0.2, octaves: 4, oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.4, sustain: 0, release: 0.2 } }).toDestination();
            this.sfxFail.volume.value = -2;

            this.sfxPop = new Tone.MembraneSynth({ pitchDecay: 0.01, octaves: 1, envelope: { attack: 0.001, decay: 0.1, sustain: 0 } }).toDestination();
            this.sfxPop.volume.value = 2;

            const notes = ["C3", "G2", "A2", "E2"];
            let step = 0;
            this.loop = new Tone.Loop(time => {
                if(!isMuted) this.bgm.triggerAttackRelease(notes[step % notes.length], "8n", time);
                step++;
            }, "4n");
            Tone.Transport.bpm.value = 110;
        },
        playBGM() { if(Tone.context.state !== 'running') Tone.start(); Tone.Transport.start(); this.loop.start(0); },
        stopBGM() { Tone.Transport.stop(); this.loop.stop(); },
        play(type) {
            if(isMuted || !this.sfxSuccess) return;
            const now = Tone.now();
            if(type === 'pop') this.sfxPop.triggerAttackRelease("C4", "16n", now);
            if(type === 'perfect') this.sfxSuccess.triggerAttackRelease(["C5", "E5", "G5", "C6"], "8n", now);
            if(type === 'ok') this.sfxSuccess.triggerAttackRelease(["C5", "E5"], "8n", now);
            if(type === 'fail') this.sfxFail.triggerAttackRelease("A1", "4n", now);
        }
    };

    function toggleMute() {
        isMuted = !isMuted;
        document.getElementById('mute-btn').innerText = isMuted ? "🔇" : "🔊";
    }

    // --- STREAMING_CHUNK: Expanded 2026 Wine Database ---
    const db = [
        { c: "Zware, gegrilde ribeye steak met pepersaus.", o: [
            { w: "Bordeaux (Cabernet Blend)", t: "perfect", d: "Krachtige tannines snijden perfect door het vet en de proteïnen." },
            { w: "Bourgogne (Pinot Noir)", t: "ok", d: "Rood bij rood vlees, maar eigenlijk wat te delicaat voor peper." },
            { w: "Zoete Sauternes", t: "bad", d: "Suiker bij een pepersteak? Een absolute aanslag op de zintuigen." }] },
        { c: "Een dozijn verse, zoute Zeeuwse oesters.", o: [
            { w: "Chablis (Strakke Chardonnay)", t: "perfect", d: "Kalkachtige mineraliteit en hoge zuren maken dit de ultieme match." },
            { w: "Champagne Brut", t: "ok", d: "Bubbels en zuren reinigen de mond heerlijk van het ziltige." },
            { w: "Zware Shiraz", t: "bad", d: "Rode wijn en rauwe oesters geeft een ranzige metaalsmaak." }] },
        { c: "Pikante Thaise groene curry met kip.", o: [
            { w: "Gewürztraminer (Licht zoet)", t: "perfect", d: "Een hint van restzoet blust de intense hitte van de pepers af." },
            { w: "Droge Sauvignon Blanc", t: "ok", d: "Lekker fris, maar mist het zoetje om de hitte echt te temmen." },
            { w: "Houtgelagerde Chardonnay", t: "bad", d: "Alcohol en eikenhout maken pittig eten exponentieel heter in de mond." }] },
        { c: "Rijke, romige truffelrisotto.", o: [
            { w: "Barolo (Nebbiolo)", t: "perfect", d: "De aardse koning der wijnen voor de aardse koning der schimmels." },
            { w: "Volle Witte Bourgondiër", t: "ok", d: "De romigheid van de wijn sluit mooi aan bij de boterige risotto." },
            { w: "Lichte Provence Rosé", t: "bad", d: "Compleet weggespoeld door het zware geweld van de truffel." }] },
        { c: "Plankje met sterke Roquefort (Blauwe kaas).", o: [
            { w: "Sauternes", t: "perfect", d: "Zout en zoet: de oudste en meest briljante combinatie in de wijnwereld." },
            { w: "Tawny Port", t: "ok", d: "Sterk, zoet en notig. Werkt altijd prima met blauwschimmel." },
            { w: "Strakke Chablis", t: "bad", d: "Hoge zuren vloeken agressief met de schimmelculturen in de kaas." }] },
        { c: "Klassieke pasta Carbonara (Guanciale & Pecorino).", o: [
            { w: "Frascati (Fris Italiaans Wit)", t: "perfect", d: "Frisse zuren snijden als een mes door de vettige kaassaus." },
            { w: "Lichte, gekoelde Pinot Noir", t: "ok", d: "Weinig tannine, dus kan net als 'vleeswijn' functioneren." },
            { w: "Zware Malbec", t: "bad", d: "Zware, stroeve tannines vermoorden de romige textuur van de pasta." }] },
        { c: "Gegrilde zalmmoot met dille-kruidenboter.", o: [
            { w: "Houtgelagerde Chardonnay", t: "perfect", d: "Vette vis en kruidenboter smeken om een rijke, boterige wijn." },
            { w: "Pinot Noir", t: "ok", d: "Zalm is een van de zeldzame vissen die zachte rode wijn tolereert." },
            { w: "Stroeve Cabernet Sauvignon", t: "bad", d: "Rode wijn met tannine geeft bij vis een afgrijselijke ijzersmaak." }] },
        { c: "Spaanse tapas: chorizo en knoflookgarnalen.", o: [
            { w: "Rioja Crianza (Tempranillo)", t: "perfect", d: "Spaanse kruidigheid voor een pittig en knoflookrijk Spaans gerecht." },
            { w: "Droge Sherry (Fino)", t: "ok", d: "Super authentiek, snijdt heerlijk door de knoflookolie heen." },
            { w: "Mierzoete Moscato", t: "bad", d: "Knoflook met zoete, bruisende dessertwijn is een recept voor buikpijn." }] },
        { c: "Vegetarische paddenstoelen ravioli.", o: [
            { w: "Earthy Pinot Noir", t: "perfect", d: "Aardse tonen in de wijn matchen perfect met de paddenstoelen." },
            { w: "Rijke Chardonnay", t: "ok", d: "Boterige witte wijn past goed bij de deegkussentjes en kaas." },
            { w: "Explosieve, jammige Zinfandel", t: "bad", d: "Fruitbom. Slaat de delicate, hartige smaak volledig dood." }] },
        { c: "Als dessert: citroentaart met merengue.", o: [
            { w: "Late Harvest Riesling", t: "perfect", d: "Hoge zuren in de wijn balanceren de citroen, het zoet sluit aan op de merengue." },
            { w: "Moscato d'Asti", t: "ok", d: "Lekker zoet en feestelijk, maar mist de zuren om de citroen aan te kunnen." },
            { w: "Kurkdroge Sancerre", t: "bad", d: "De taart is zoeter dan de wijn, waardoor de wijn ineens naar citroenzuur smaakt." }] }
    ];

    // --- GAME STATE ---
    let state = {
        score: 0, lives: 3, combo: 0, maxCombo: 0,
        deck: [], qIndex: 0, locked: false,
        timer: null, timeLeft: 100
    };

    const DOM = {
        screens: document.querySelectorAll('.screen'),
        score: document.getElementById('score-display'),
        lives: document.getElementById('lives-display'),
        combo: document.getElementById('combo-display'),
        timerBar: document.getElementById('timer-bar'),
        lars: document.getElementById('lars-sprite'),
        customer: document.getElementById('customer-text'),
        options: document.getElementById('options-container'),
        overlay: document.getElementById('feedback-overlay'),
        fbTitle: document.getElementById('fb-badge'),
        fbDesc: document.getElementById('fb-desc'),
        fbBtn: document.getElementById('fb-btn'),
        goScore: document.getElementById('go-score'),
        goCombo: document.getElementById('go-combo'),
        goRank: document.getElementById('go-rank'),
        goRoast: document.getElementById('go-roast'),
        goBg: document.getElementById('go-bg'),
        card: document.getElementById('card-container')
    };

    // 3D Card Hover Effect
    document.addEventListener('mousemove', (e) => {
        if(state.locked) return;
        const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
        DOM.card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    // --- STREAMING_CHUNK: Game Logic Loop ---
    function switchScreen(id) {
        DOM.screens.forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function initGame() {
        AudioSys.init(); AudioSys.playBGM();
        state = { score: 0, lives: 3, combo: 0, maxCombo: 0, deck: [...db].sort(() => Math.random() - 0.5), qIndex: 0, locked: false, timer: null, timeLeft: 100 };
        updateHUD(); switchScreen('game-ui'); loadQuestion();
    }

    function updateHUD() {
        DOM.score.innerText = state.score;
        DOM.lives.innerText = '❤️'.repeat(state.lives) + '🖤'.repeat(3 - state.lives);
        if(state.combo > 1) {
            DOM.combo.innerText = `x${state.combo} COMBO`; DOM.combo.classList.add('active');
        } else { DOM.combo.classList.remove('active'); }
    }

    function loadQuestion() {
        if (state.lives <= 0) return triggerGameOver();
        if (state.qIndex >= state.deck.length) return triggerGameOver(true);

        state.locked = false; state.timeLeft = 100;
        DOM.overlay.classList.remove('show');
        DOM.lars.className = 'lars-sprite idle';
        document.getElementById('game-container').classList.remove('shake-active');

        const q = state.deck[state.qIndex];
        DOM.customer.innerText = q.c;
        DOM.options.innerHTML = '';
        
        [...q.o].sort(() => Math.random() - 0.5).forEach(opt => {
            const btn = document.createElement('button'); btn.className = 'opt-btn';
            btn.innerHTML = `<span class="wine-icon">🍷</span> ${opt.w}`;
            btn.onclick = () => submitAnswer(opt);
            DOM.options.appendChild(btn);
        });

        clearInterval(state.timer);
        DOM.timerBar.className = 'timer-fill';
        state.timer = setInterval(() => {
            if(state.locked) return;
            state.timeLeft -= 0.6; // Speed of timer
            DOM.timerBar.style.width = Math.max(0, state.timeLeft) + '%';
            
            if(state.timeLeft < 40) DOM.timerBar.className = 'timer-fill warning';
            if(state.timeLeft < 15) DOM.timerBar.className = 'timer-fill danger';

            if(state.timeLeft <= 0) {
                clearInterval(state.timer);
                submitAnswer(null); // Timeout
            }
        }, 50);
    }

    function submitAnswer(opt) {
        if(state.locked) return;
        state.locked = true; clearInterval(state.timer);
        AudioSys.play('pop');

        let isPerfect = false, isOk = false, isTimeout = !opt;
        
        if(isTimeout) {
            state.combo = 0; state.lives--; state.score -= 20;
            DOM.fbTitle.innerText = "⏳ TE LAAT! (-1 Leven)"; DOM.fbTitle.style.backgroundColor = varColor('--warning');
            DOM.fbDesc.innerText = "De klant verloor zijn geduld en is weggelopen naar de concurrentie.";
            setFailVisuals();
        } else {
            DOM.fbDesc.innerText = opt.d;
            if(opt.t === 'perfect') {
                state.combo++; if(state.combo > state.maxCombo) state.maxCombo = state.combo;
                const points = 100 + (state.combo * 10); state.score += points;
                DOM.fbTitle.innerText = `⭐ PERFECT! (+${points})`; DOM.fbTitle.style.backgroundColor = varColor('--success'); DOM.fbTitle.style.color = '#000';
                DOM.lars.className = 'lars-sprite action success-glow';
                AudioSys.play('perfect'); spawnParticles('0, 230, 118', 60);
            } else if(opt.t === 'ok') {
                state.combo = 0; state.score += 50;
                DOM.fbTitle.innerText = "✔️ PRIMA (+50)"; DOM.fbTitle.style.backgroundColor = varColor('--warning'); DOM.fbTitle.style.color = '#000';
                DOM.lars.className = 'lars-sprite action';
                AudioSys.play('ok'); spawnParticles('255, 234, 0', 20);
            } else {
                state.combo = 0; state.lives--; state.score -= 50;
                DOM.fbTitle.innerText = "❌ VRESELIJK (-1 Leven)"; DOM.fbTitle.style.backgroundColor = varColor('--danger'); DOM.fbTitle.style.color = '#fff';
                setFailVisuals();
            }
        }

        updateHUD();
        DOM.card.style.transform = `rotateY(0deg) rotateX(0deg)`; // Reset 3D
        
        setTimeout(() => {
            if(state.lives <= 0 || state.qIndex >= state.deck.length - 1) {
                DOM.fbBtn.innerText = "Resultaat Bekijken"; DOM.fbBtn.onclick = () => triggerGameOver();
            } else {
                DOM.fbBtn.innerText = "Volgende Tafel"; DOM.fbBtn.onclick = () => nextQuestion();
            }
            DOM.overlay.classList.add('show');
        }, 300);
    }

    function setFailVisuals() {
        DOM.lars.className = 'lars-sprite action fail-glow';
        document.getElementById('game-container').classList.add('shake-active');
        AudioSys.play('fail');
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    function nextQuestion() { state.qIndex++; loadQuestion(); }

    // --- STREAMING_CHUNK: Game Over Calculation ---
    function triggerGameOver(completed = false) {
        AudioSys.stopBGM(); clearInterval(state.timer);
        DOM.overlay.classList.remove('show');
        
        DOM.goScore.innerText = state.score + ' pt';
        DOM.goCombo.innerText = 'x' + state.maxCombo;

        const maxPossible = db.length * 150; // Approximated with combos
        const percent = (state.score / (state.qIndex * 100 || 1)) * 100;

        if (state.lives <= 0 || percent < 40) {
            DOM.goBg.style.backgroundImage = "url('images/Lars_angry.jpg')";
            DOM.goRank.innerText = "🤢 PRUTSER"; DOM.goRank.style.backgroundColor = varColor('--danger'); DOM.goRank.style.color = 'white';
            DOM.goRoast.innerText = '"Je serveerde Chablis bij een biefstuk. Verwijder per direct je kurkentrekker en verlaat het pand."';
        } else if (percent < 85) {
            DOM.goBg.style.backgroundImage = "url('images/Lars_congrats.jpg')";
            DOM.goRank.innerText = "😐 LIEFHEBBER"; DOM.goRank.style.backgroundColor = varColor('--warning'); DOM.goRank.style.color = 'black';
            DOM.goRoast.innerText = '"Je weet dat rood bij vlees hoort, maar er is nog ruimte voor verfijning. Prima shift gewerkt."';
        } else {
            DOM.goBg.style.backgroundImage = "url('images/Lars_congrats.jpg')"; // Ideally congrats.png
            DOM.goRank.innerText = "⭐ LEGENDE"; DOM.goRank.style.backgroundColor = varColor('--success'); DOM.goRank.style.color = 'black';
            DOM.goRoast.innerText = '"Absolute perfectie. Je neus herkent een kurk op 3 kilometer afstand. Een ware meester."';
        }

        switchScreen('game-over-screen');
    }

    function quitGame() { AudioSys.stopBGM(); clearInterval(state.timer); switchScreen('start-screen'); }
    function resetToMenu() { switchScreen('start-screen'); }

</script>
