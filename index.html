<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lars de Sommelier</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        :root {
            /* Sfeervolle bordeauxrode retro palet */
            --bg-dark: #1a0a0c;
            --panel-bg: rgba(242, 237, 228, 0.96);
            --panel-border: #8c2531;
            --text-main: #2b2521;
            --success: #2e7d32;
            --warning: #e65100;
            --danger: #c62828;
            --btn-hover: #e0d8c8;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'VT323', monospace;
            /* Sfeervolle diepe wijnrode radial gradient i.p.v. zware achtergrondafbeelding */
            background: radial-gradient(circle, #300f13 0%, #100305 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtiel CRT Scanline effect voor echte arcade sfeer */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* --- LAYOUT & CONTAINERS --- */
        #app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background: rgba(26, 10, 12, 0.85); /* Donkere sfeervolle overlay over de background */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 20px;
            align-items: center;
            justify-content: flex-start;
            overflow-y: auto;
            animation: fadeIn 0.3s ease-in-out;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            font-family: 'Press Start 2P', cursive; 
            font-size: 22px; 
            color: var(--panel-border); 
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            margin-bottom: 10px; 
            line-height: 1.4;
            text-align: center;
        }

        .btn {
            font-family: 'Press Start 2P', cursive;
            background: var(--panel-border); 
            color: white;
            border: 4px solid #58111A; 
            padding: 15px 20px; 
            font-size: 14px;
            border-radius: 8px; 
            cursor: pointer;
            box-shadow: 0 6px 0px #3a080f;
            transition: all 0.1s;
            width: 100%;
            text-align: center;
            margin-top: 15px;
        }
        .btn:active:not(:disabled) { 
            transform: translateY(6px); 
            box-shadow: 0 0px 0px #3a080f; 
        }
        .btn:disabled {
            background: #666 !important;
            border-color: #444 !important;
            box-shadow: 0 4px 0px #333 !important;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* --- PRELOADER & START PANEL --- */
        .menu-panel {
            background: var(--panel-bg);
            border: 4px solid var(--panel-border);
            border-radius: 12px;
            padding: 30px 20px;
            width: 100%;
            text-align: center;
            margin: auto;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            margin: 15px auto;
            border: 4px solid var(--panel-border);
            border-radius: 12px;
            background-color: #e0d8c8;
            background-size: cover;
            background-position: center;
            image-rendering: pixelated;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transition: background-image 0.2s ease-in-out;
        }

        .rules-box {
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            font-size: 18px;
            line-height: 1.5;
            margin-top: 15px;
        }

        /* Loader status */
        .loader-container {
            margin-top: 15px;
            width: 100%;
        }
        .loader-bar {
            width: 100%;
            height: 12px;
            background: #ccc;
            border: 2px solid var(--panel-border);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        .loader-fill {
            width: 0%;
            height: 100%;
            background: var(--panel-border);
            transition: width 0.1s ease-out;
        }
        .loader-text {
            font-family: 'Press Start 2P', cursive;
            font-size: 9px;
            margin-top: 6px;
            color: var(--panel-border);
        }

        /* --- GAMEPLAY UI --- */
        .header-bar {
            width: 100%; 
            display: flex; 
            justify-content: space-between;
            padding: 12px 20px; 
            background: var(--panel-bg);
            border-bottom: 4px solid var(--panel-border);
            font-size: 26px; 
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 5;
        }

        .stage-container {
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            width: 100%;
            padding: 15px;
            min-height: 220px;
        }

        /* Lars display frame */
        .lars-frame {
            width: 100%;
            max-width: 280px;
            height: 100%;
            max-height: 280px;
            background-color: #2b1114;
            border: 4px solid var(--panel-border);
            border-radius: 12px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            image-rendering: pixelated; /* Mooie scherpe retro pixels */
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            transition: transform 0.2s, background-image 0.2s ease-in-out;
        }
        
        /* Subtiele retro adem-animatie */
        @keyframes subtleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .lars-frame.idle {
            animation: subtleBounce 2s infinite ease-in-out;
        }
        .lars-frame.fail {
            animation: none;
            transform: scale(0.98);
        }

        .customer-card {
            background: var(--panel-bg); 
            padding: 15px; 
            border-radius: 12px;
            border: 4px solid var(--panel-border); 
            font-size: 22px; 
            text-align: center;
            margin-bottom: 15px; 
            width: 100%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            position: relative;
        }
        .customer-card::before {
            content: "Klant zegt:";
            position: absolute;
            top: -12px;
            left: 15px;
            background: var(--panel-border);
            color: white;
            font-size: 14px;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Press Start 2P', cursive;
        }

        .options-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            width: 100%; 
            padding-bottom: 20px; 
        }

        .wine-btn {
            font-family: 'VT323', monospace; 
            background: var(--panel-bg);
            border: 3px solid #888; 
            padding: 12px 15px; 
            font-size: 20px;
            border-radius: 8px; 
            cursor: pointer; 
            text-align: left;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 0px #888;
        }
        .wine-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #888;
        }
        .wine-btn:hover { border-color: var(--panel-border); background: var(--btn-hover); }

        /* --- FEEDBACK MODAL --- */
        #feedback-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: flex-end;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
            z-index: 20;
        }
        #feedback-overlay.show { opacity: 1; pointer-events: auto; }

        .feedback-panel {
            background: var(--panel-bg); 
            border-top: 6px solid var(--panel-border);
            width: 100%; padding: 25px 20px;
            border-radius: 16px 16px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            text-align: center;
        }
        #feedback-overlay.show .feedback-panel { transform: translateY(0); }

        .status-badge {
            font-family: 'Press Start 2P', cursive; 
            font-size: 14px; 
            margin-bottom: 12px; 
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            color: white;
        }
        #feedback-desc { font-size: 22px; margin-bottom: 20px; }

    </style>
    <!-- Tone.js for high-fidelity browser-synthesized audio effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>

<div id="app-container">
    
    <!-- MENU SCHERM / PRELOAD SCHERM -->
    <div id="start-screen" class="screen menu-screen active">
        <div class="menu-panel">
            <h1>SOMMELIER<br>LARS</h1>
            <div id="start-profile" class="profile-pic"></div>
            <p style="font-size: 22px; font-weight: bold;">De Enige Echte Expert</p>
            
            <div class="rules-box">
                🍷 <b>Perfecte Match:</b> +100 pt<br>
                😐 <b>Prima Match:</b> +50 pt<br>
                🤢 <b>Foute Match:</b> -1 leven
            </div>
            
            <!-- Preloader Component -->
            <div class="loader-container" id="preloader-container">
                <div class="loader-bar">
                    <div class="loader-fill" id="preloader-fill"></div>
                </div>
                <div class="loader-text" id="preloader-label">DRUIVEN PLUKKEN (0%)...</div>
            </div>
            
            <button class="btn" id="start-btn" onclick="startGame()" disabled>WINKEL LADEN...</button>
        </div>
    </div>

    <!-- SPEL SCHERM -->
    <div id="game-screen" class="screen">
        <div class="header-bar">
            <div>⭐ <span id="score">0</span></div>
            <div id="lives">❤️❤️❤️</div>
        </div>

        <div class="stage-container">
            <div id="lars-sprite" class="lars-frame idle"></div>
        </div>

        <div class="customer-card">
            "<span id="customer-quote"></span>"
        </div>

        <div class="options-grid" id="options"></div>
    </div>

    <!-- FEEDBACK OVERLAY (Pop-up na antwoord) -->
    <div id="feedback-overlay">
        <div class="feedback-panel">
            <div id="status-badge" class="status-badge">RESULTAAT</div>
            <div id="feedback-desc">Uitleg over de wijn.</div>
            <button class="btn" onclick="nextRound()">VOLGENDE KLANT</button>
        </div>
    </div>

    <!-- GAME OVER SCHERM -->
    <div id="game-over-screen" class="screen">
        <div class="menu-panel" style="margin: auto;">
            <h1>EINDE SHIFT</h1>
            <p style="font-size: 24px; margin: 20px 0;">Eindscore: <b id="final-score" style="color:var(--panel-border)">0</b></p>
            <p id="game-over-msg" style="font-size: 20px; margin-bottom: 20px;"></p>
            <button class="btn" onclick="resetApp()">OPNIEUW SPELEN</button>
        </div>
    </div>

</div>

<script>
    // --- AUDIO ENGINE ---
    const Audio = {
        synth: null,
        init: function() {
            if (!this.synth) this.synth = new Tone.PolySynth(Tone.Synth).toDestination();
        },
        playClick: function() {
            if (!this.synth) return;
            this.synth.triggerAttackRelease("C6", "32n", undefined, 0.2);
        },
        playSelect: function() {
            if (!this.synth) return;
            this.synth.triggerAttackRelease("G5", "16n", undefined, 0.4);
        },
        playSuccess: function() {
            if (!this.synth) return;
            const now = Tone.now();
            this.synth.triggerAttackRelease(["C5", "E5", "G5"], "8n", now, 0.5);
            this.synth.triggerAttackRelease(["E5", "G5", "C6"], "4n", now + 0.15, 0.5);
        },
        playOk: function() {
            if (!this.synth) return;
            const now = Tone.now();
            this.synth.triggerAttackRelease("C5", "8n", now, 0.4);
            this.synth.triggerAttackRelease("E5", "4n", now + 0.15, 0.4);
        },
        playFail: function() {
            if (!this.synth) return;
            const now = Tone.now();
            this.synth.triggerAttackRelease("D3", "4n", now, 0.6);
            this.synth.triggerAttackRelease("A2", "2n", now + 0.3, 0.6);
        }
    };

    // --- ASSETS TO PRELOAD ---
    // Lokale bestanden uit jouw directory met exact de juiste hoofdletters
    const ASSETS = {
        larsIdle: "Lars_idle.png",
        larsFail: "Lars_fail.png"
    };

    // Robuuste fallbacks voor het geval de bestanden lokaal ontbreken
    const FALLBACKS = {
        larsIdle: "https://placehold.co/280x280/58111A/E0D8C8?text=Lars+Idle+🍷",
        larsFail: "https://placehold.co/280x280/58111A/C62828?text=Lars+Disgusted+🤢"
    };

    // --- DATASET (De 8 hoogwaardig onderzochte Franse wijnmatches) ---
    const wineDB = [
        { customer: "Ik bestel een zware, gegrilde ribeye steak met pepersaus.", options: [
            { wine: "Bordeaux (Cabernet Sauvignon)", type: "perfect", desc: "Perfect! De stevige tannines breken door het vet van de steak." },
            { wine: "Bourgogne (Pinot Noir)", type: "ok", desc: "Prima, rood bij rood vlees, maar eigenlijk wat te licht." },
            { wine: "Zoete Sauternes", type: "bad", desc: "Vreselijk! Zoete dessertwijn bij een pepersteak is een misdaad." }]
        },
        { customer: "We delen een dozijn verse, zoute oesters.", options: [
            { wine: "Chablis (Strakke Chardonnay)", type: "perfect", desc: "Geniaal. De mineraliteit past perfect bij ziltige oesters." },
            { wine: "Champagne Brut", type: "ok", desc: "Lekker feestelijk, de bubbels snijden er goed doorheen." },
            { wine: "Zware Shiraz (Rood)", type: "bad", desc: "Nee! Rode wijn bij oesters geeft een vieze metaalsmaak." }]
        },
        { customer: "Ik eet een super pittige Thaise groene curry.", options: [
            { wine: "Gewürztraminer (Licht zoet)", type: "perfect", desc: "Spot on! Een beetje restzoet blust de pittigheid af." },
            { wine: "Droge Sauvignon Blanc", type: "ok", desc: "Lekker fris, maar blust de hitte niet optimaal." },
            { wine: "Houtgelagerde Chardonnay", type: "bad", desc: "Oef! Alcohol en houtrijping maken het eten alleen maar brandender." }]
        },
        { customer: "Voor mij de rijke, romige truffelrisotto.", options: [
            { wine: "Barolo (Nebbiolo)", type: "perfect", desc: "Klassiek! De aardse tonen matchen fantastisch met truffel." },
            { wine: "Meursault (Vol wit)", type: "ok", desc: "Lekker romig wit past goed bij de textuur van de risotto." },
            { wine: "Lichte Provence Rosé", type: "bad", desc: "Te waterig voor zo'n zwaar, aards gerecht." }]
        },
        { customer: "Een plankje met sterke, blauwe schimmelkaas (Roquefort).", options: [
            { wine: "Sauternes", type: "perfect", desc: "De klassieker! Het zoete balanceert het zoute van de kaas." },
            { wine: "Ruby Port", type: "ok", desc: "Sterk en zoet, past altijd wel bij blauwe kaas." },
            { wine: "Droge Champagne", type: "bad", desc: "De hoge zuren vloeken totaal met de schimmelkaas." }]
        },
        { customer: "Gebraden eendenborst met een zachte bessensaus.", options: [
            { wine: "Bourgogne (Pinot Noir)", type: "perfect", desc: "Prachtig! Aardse en fruitige tonen zijn gemaakt voor eend." },
            { wine: "Beaujolais", type: "ok", desc: "Lekker fruitig, past goed bij de bessensaus." },
            { wine: "Zware Cabernet Sauvignon", type: "bad", desc: "Te lomp. De tannines vernietigen de smaak van de eend." }]
        },
        { customer: "Klassieke pasta Carbonara met veel spek en kaas.", options: [
            { wine: "Frascati of Soave", type: "perfect", desc: "Heerlijk fris Italiaans wit snijdt perfect door het vette spek." },
            { wine: "Lichte Pinot Noir", type: "ok", desc: "Rood kan, mits licht gekoeld en weinig tannine." },
            { wine: "Zware, eikenhouten Malbec", type: "bad", desc: "Veel te zwaar, overheerst de pasta volledig." }]
        },
        { customer: "Een frisse salade met geitenkaas en honing.", options: [
            { wine: "Sancerre (Sauvignon Blanc)", type: "perfect", desc: "What grows together goes together. Sancerre snijdt door de geitenkaas." },
            { wine: "Droge Rosé", type: "ok", desc: "Een veilige, frisse keuze voor bij een salade." },
            { wine: "Zware, warme Shiraz", type: "bad", desc: "Rode, zware wijn bij een frisse geitenkaassalade is echt niet oké." }]
        }
    ];

    // --- GAME STATE ---
    let state = {
        score: 0,
        lives: 3,
        questions: [],
        currentIndex: 0,
        locked: false
    };

    // --- STREAMING_CHUNK: Managing Preloading pipeline and Fallbacks... ---
    const Preloader = {
        loadedCount: 0,
        totalAssets: Object.keys(ASSETS).length,
        loadedStatus: {},

        start: function() {
            const fill = document.getElementById('preloader-fill');
            const label = document.getElementById('preloader-label');
            const startBtn = document.getElementById('start-btn');

            const handleLoaded = (key, success) => {
                this.loadedCount++;
                this.loadedStatus[key] = success;
                const percentage = Math.round((this.loadedCount / this.totalAssets) * 100);
                
                fill.style.width = percentage + "%";
                label.innerText = `FLESSEN ONTKURKEN (${percentage}%)...`;

                if (this.loadedCount >= this.totalAssets) {
                    setTimeout(() => {
                        this.applyImages();
                        document.getElementById('preloader-container').style.display = 'none';
                        startBtn.innerText = "START SHIFT";
                        startBtn.removeAttribute('disabled');
                    }, 500);
                }
            };

            // Preload Lars Idle
            const idleImg = new Image();
            idleImg.src = ASSETS.larsIdle;
            idleImg.onload = () => handleLoaded('larsIdle', true);
            idleImg.onerror = () => handleLoaded('larsIdle', false);

            // Preload Lars Fail
            const failImg = new Image();
            failImg.src = ASSETS.larsFail;
            failImg.onload = () => handleLoaded('larsFail', true);
            failImg.onerror = () => handleLoaded('larsFail', false);
        },

        applyImages: function() {
            // Apply profile picture preview
            const profile = document.getElementById('start-profile');
            if (this.loadedStatus['larsIdle']) {
                profile.style.backgroundImage = `url('${ASSETS.larsIdle}')`;
            } else {
                profile.style.backgroundImage = `url('${FALLBACKS.larsIdle}')`;
            }
        },

        getSpriteURL: function(type) {
            if (type === 'idle') {
                return this.loadedStatus['larsIdle'] ? ASSETS.larsIdle : FALLBACKS.larsIdle;
            } else {
                return this.loadedStatus['larsFail'] ? ASSETS.larsFail : FALLBACKS.larsFail;
            }
        }
    };

    // --- STREAMING_CHUNK: Core Logic functions... ---
    function shuffle(arr) {
        return arr.sort(() => Math.random() - 0.5);
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function startGame() {
        // Init browser audio after user gesture
        await Tone.start();
        Audio.init();
        Audio.playClick();

        state.score = 0;
        state.lives = 3;
        state.questions = shuffle([...wineDB]);
        state.currentIndex = 0;
        
        updateHeader();
        switchScreen('game-screen');
        loadQuestion();
    }

    function updateHeader() {
        document.getElementById('score').innerText = state.score;
        let hearts = '';
        for(let i=0; i<3; i++) hearts += (i < state.lives) ? '❤️' : '🖤';
        document.getElementById('lives').innerText = hearts;
    }

    function loadQuestion() {
        if (state.lives <= 0) return showGameOver("Ontslagen! Te veel klanten weggelopen.");
        if (state.currentIndex >= state.questions.length) return showGameOver("Gefeliciteerd! Je hebt de shift overleefd.");

        state.locked = false;
        document.getElementById('feedback-overlay').classList.remove('show');
        
        // Dynamic loading from preload results
        const larsSprite = document.getElementById('lars-sprite');
        larsSprite.className = 'lars-frame idle';
        larsSprite.style.backgroundImage = `url('${Preloader.getSpriteURL('idle')}')`;

        const q = state.questions[state.currentIndex];
        document.getElementById('customer-quote').innerText = q.customer;

        const optionsBox = document.getElementById('options');
        optionsBox.innerHTML = '';
        
        // Shuffle current options
        const choices = shuffle([...q.options]);
        choices.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'wine-btn';
            btn.innerHTML = `🍷 &nbsp; ${opt.wine}`;
            btn.onclick = () => handleChoice(opt);
            optionsBox.appendChild(btn);
        });
    }

    // --- STREAMING_CHUNK: Processing user answer... ---
    function handleChoice(option) {
        if (state.locked) return;
        state.locked = true;
        Audio.playSelect();

        const badge = document.getElementById('status-badge');
        document.getElementById('feedback-desc').innerText = option.desc;
        const sprite = document.getElementById('lars-sprite');

        setTimeout(() => {
            if (option.type === 'perfect') {
                state.score += 100;
                badge.innerText = "⭐ PERFECT! (+100)";
                badge.style.backgroundColor = "var(--success)";
                sprite.className = 'lars-frame idle';
                sprite.style.backgroundImage = `url('${Preloader.getSpriteURL('idle')}')`;
                Audio.playSuccess();
            } else if (option.type === 'ok') {
                state.score += 50;
                badge.innerText = "✔️ PRIMA KEUZE (+50)";
                badge.style.backgroundColor = "var(--warning)";
                sprite.className = 'lars-frame idle';
                sprite.style.backgroundImage = `url('${Preloader.getSpriteURL('idle')}')`;
                Audio.playOk();
            } else {
                state.score -= 50;
                state.lives -= 1;
                badge.innerText = "❌ VRESELIJK! (-1 leven)";
                badge.style.backgroundColor = "var(--danger)";
                sprite.className = 'lars-frame fail';
                sprite.style.backgroundImage = `url('${Preloader.getSpriteURL('fail')}')`;
                Audio.playFail();
            }

            updateHeader();
            document.getElementById('feedback-overlay').classList.add('show');
        }, 150);
    }

    function nextRound() {
        Audio.playClick();
        state.currentIndex++;
        loadQuestion();
    }

    function showGameOver(msg) {
        document.getElementById('final-score').innerText = state.score;
        document.getElementById('game-over-msg').innerText = msg;
        switchScreen('game-over-screen');
    }

    function resetApp() {
        Audio.playClick();
        switchScreen('start-screen');
    }

    // On window load: trigger assets preloader
    window.onload = () => {
        Preloader.start();
    }
</script>

</body>
</html>
